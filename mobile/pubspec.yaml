name: mobile
description: Intelligent wardrobe management with AI styling.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0

  # UI / Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  logger: ^2.3.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env